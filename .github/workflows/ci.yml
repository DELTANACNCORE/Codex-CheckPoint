name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python hooks and skills
        run: python3 -m py_compile .codex/hooks/*.py .codex/skills/*/*.py
      - name: Check shell scripts
        run: bash -n install.sh uninstall.sh pack.sh unpack.sh
